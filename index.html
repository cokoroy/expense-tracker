<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Expense Tracker</title>

  <!-- Bootstrap 5 (Requirement 2: mobile responsive design) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container app-container py-4">

    <!-- ============ NEW EXPENSE PANEL ============ -->
    <section class="panel panel-light mb-4" id="newExpensePanel">

      <!-- Collapsed state: single button (matches screenshot 1) -->
      <div id="addExpenseCollapsed" class="text-center">
        <button type="button" class="btn btn-brand" id="showFormBtn">Add New Expense</button>
      </div>

      <!-- Expanded state: the form (matches screenshot 2) -->
      <div id="addExpenseExpanded" class="d-none">
        <form id="expenseForm" novalidate>
          <div class="row g-3">
            <div class="col-12 col-md-6">
              <label for="titleInput" class="form-label">Title</label>
              <input type="text" class="form-control" id="titleInput" maxlength="60" autocomplete="off">
              <div class="invalid-feedback">Please enter a title.</div>
            </div>
            <div class="col-12 col-md-6">
              <label for="amountInput" class="form-label">Amount (RM)</label>
              <input type="number" class="form-control" id="amountInput" min="0.01" step="0.01" inputmode="decimal">
              <div class="invalid-feedback">Please enter an amount greater than 0.</div>
            </div>
            <div class="col-12 col-md-6">
              <label for="dateInput" class="form-label">Date</label>
              <input type="date" class="form-control" id="dateInput">
              <div class="invalid-feedback">Please pick a date.</div>
            </div>
            <div class="col-12 col-md-6 d-flex align-items-end">
              <!-- AI feature 1: receipt scanning -->
              <div class="w-100">
                <input type="file" id="receiptInput" accept="image/*" capture="environment" class="d-none">
                <button type="button" class="btn btn-outline-brand w-100" id="scanReceiptBtn">
                  <span id="scanReceiptLabel">📷 Scan a receipt (AI)</span>
                  <span id="scanReceiptSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                </button>
                <div class="form-text ai-hint" id="receiptHint">Upload a receipt photo and the form fills itself.</div>
              </div>
            </div>
          </div>

          <div class="d-flex justify-content-end gap-2 mt-3">
            <button type="button" class="btn btn-dark-pill" id="cancelBtn">Cancel</button>
            <button type="submit" class="btn btn-dark-pill" id="submitBtn">Add Expense</button>
          </div>
        </form>
      </div>
    </section>

    <!-- ============ EXPENSES PANEL ============ -->
    <section class="panel panel-dark">

      <!-- Year filter -->
      <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <span class="filter-label">Filter by year</span>
        <select class="form-select year-select" id="yearSelect" aria-label="Filter by year"></select>
      </div>

      <!-- Requirement 3 (bonus): monthly totals diagram -->
      <div class="panel panel-chart mb-3">
        <div class="chart" id="chart"></div>
      </div>

      <!-- AI feature 2: yearly AI summary -->
      <div class="text-center mb-3">
        <button type="button" class="btn btn-outline-light-sm" id="aiSummaryBtn">
          ✨ Generate AI insights for <span id="aiSummaryYear"></span>
          <span id="aiSummarySpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
        </button>
      </div>
      <div id="aiSummaryCard" class="ai-summary d-none"></div>

      <!-- Yearly total strip -->
      <div id="yearTotalStrip" class="year-total d-none">
        <span>Total for <span class="yt-year"></span></span>
        <span class="yt-amount"></span>
      </div>

      <!-- Expense list -->
      <div id="expenseList"></div>

      <!-- Empty state (exact wording required by the spec) -->
      <p id="emptyMessage" class="empty-message d-none">Found no expenses.</p>
    </section>

    <footer class="app-footer">
      Built with HTML, CSS, JavaScript, Bootstrap &amp; jQuery · AI features powered by a serverless proxy
    </footer>
  </div>

  <!-- Toast for messages -->
  <div id="toast" class="app-toast d-none"></div>

  <!-- jQuery (Requirement 4: bonus) -->
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
